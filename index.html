<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer</title>
    <!-- Tailwind CSS for minimalist controls styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fafafa;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body class="relative">

    <!-- UI Toggle Button -->
    <button id="ui-toggle-btn"
        class="absolute top-4 right-4 z-20 px-3 py-1.5 bg-white/90 backdrop-blur-md border border-neutral-200/80 hover:bg-neutral-100 text-neutral-700 rounded-lg shadow-sm transition font-sans font-medium text-[11px]">
        Hide UI
    </button>

    <!-- Minimal Overlay Controls -->
    <div id="main-controls" class="absolute top-4 left-4 z-10 flex flex-col gap-2 pointer-events-none max-w-sm">
        <!-- Level of Detail Indicator & Zoom Controls -->
        <div
            class="bg-white/90 backdrop-blur-md border border-neutral-200/80 px-4 py-3 rounded-xl shadow-lg pointer-events-auto flex flex-col gap-2.5 text-xs text-neutral-600 font-mono">
            <div class="flex items-center justify-between gap-6">
                <div class="flex flex-col">
                    <div class="flex items-center gap-1.5">
                        <span>LOD: <strong id="lod-indicator" class="text-indigo-600 font-bold">Micro</strong></span>
                    </div>
                    <span>Zoom: <span id="zoom-indicator">100%</span></span>
                </div>
                <div class="flex gap-2">
                    <button id="auto-clock-btn"
                        class="px-2.5 py-1 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded-md transition font-sans font-medium text-[11px] flex items-center gap-1.5 hidden">
                        <span id="clock-status-dot" class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
                        Auto Clock
                    </button>
                    <button id="copy-layout-btn"
                        class="px-2.5 py-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 rounded-md transition font-sans font-medium text-[11px]">
                        Copy Layout
                    </button>
                    <button id="reset-view-btn"
                        class="px-2.5 py-1 bg-neutral-100 hover:bg-neutral-200 text-neutral-700 rounded-md transition font-sans font-medium text-[11px]">
                        Reset View
                    </button>
                </div>
            </div>

            <!-- LOD Selector Buttons -->
            <div class="flex gap-1 bg-neutral-100 p-1 rounded-lg">
                <button id="lod-dyn-btn"
                    class="flex-1 px-1.5 py-1 text-[10px] rounded font-bold bg-white shadow-sm text-indigo-700 transition">Dynamic</button>
                <button id="lod-mic-btn"
                    class="flex-1 px-1.5 py-1 text-[10px] rounded font-medium text-neutral-500 hover:text-neutral-700 transition">Micro</button>
                <button id="lod-mes-btn"
                    class="flex-1 px-1.5 py-1 text-[10px] rounded font-medium text-neutral-500 hover:text-neutral-700 transition">Meso</button>
                <button id="lod-mac-btn"
                    class="flex-1 px-1.5 py-1 text-[10px] rounded font-medium text-neutral-500 hover:text-neutral-700 transition">Macro</button>
            </div>

            <div class="h-[1px] bg-neutral-100 my-0.5"></div>

            <!-- Interactive Presets Quick Help -->
            <div class="flex flex-col gap-1.5 font-sans">
                <span class="text-[10px] uppercase tracking-wider font-bold text-neutral-400">Keyboard Presets</span>
                <div class="grid grid-cols-2 gap-2">
                    <button id="preset-1-btn"
                        class="flex items-center justify-center gap-1 px-2 py-1.5 bg-indigo-50 border border-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-100/70 transition font-medium text-left">
                        <kbd
                            class="px-1 py-0.2 bg-white border border-indigo-200 rounded text-[9px] font-mono font-bold">1</kbd>
                        <span>CMOS NAND</span>
                    </button>
                    <button id="preset-2-btn"
                        class="flex items-center justify-center gap-1 px-2 py-1.5 bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-lg hover:bg-emerald-100/70 transition font-medium text-left">
                        <kbd
                            class="px-1 py-0.2 bg-white border border-emerald-200 rounded text-[9px] font-mono font-bold">2</kbd>
                        <span>CMOS Arrays</span>
                    </button>
                    <button id="preset-3-btn"
                        class="flex items-center justify-center gap-1 px-2 py-1.5 bg-cyan-50 border border-cyan-100 text-cyan-700 rounded-lg hover:bg-cyan-100/70 transition font-medium text-left">
                        <kbd
                            class="px-1 py-0.2 bg-white border border-cyan-200 rounded text-[9px] font-mono font-bold">3</kbd>
                        <span>CMOS Latches</span>
                    </button>
                    <button id="preset-4-btn"
                        class="flex items-center justify-center gap-1 px-2 py-1.5 bg-rose-50 border border-rose-100 text-rose-700 rounded-lg hover:bg-rose-100/70 transition font-medium text-left">
                        <kbd
                            class="px-1 py-0.2 bg-white border border-rose-200 rounded text-[9px] font-mono font-bold">4</kbd>
                        <span>ALU & Clock</span>
                    </button>
                </div>

                <div class="h-[1px] bg-neutral-100 my-0.5"></div>

                <span class="text-[10px] uppercase tracking-wider font-bold text-neutral-400">Navigation</span>
                <div class="text-[10px] text-neutral-500 space-y-1 leading-relaxed font-sans">
                    <div>• <strong>Pan:</strong> Scroll up/down/left/right OR Right-Click Drag</div>
                    <div>• <strong>Zoom:</strong> Hold <kbd
                            class="px-1 bg-neutral-100 border border-neutral-200 rounded font-mono text-[9px]">Space</kbd>
                        while scrolling, or use <kbd
                            class="px-1 bg-neutral-100 border border-neutral-200 rounded font-mono text-[9px]">↑</kbd>
                        <kbd class="px-1 bg-neutral-100 border border-neutral-200 rounded font-mono text-[9px]">↓</kbd>
                        Arrow Keys
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Live Truth Table Panel (Compact & Minimalist - dynamically shown) -->
    <div id="truth-table-panel"
        class="absolute bottom-4 right-4 z-10 bg-white/80 backdrop-blur-sm border border-neutral-200/60 px-2.5 py-2 rounded-lg shadow-sm pointer-events-auto text-[10px] font-mono min-w-[110px]">
        <div
            class="font-semibold text-neutral-500 mb-1 pb-1 border-b border-neutral-100 flex items-center justify-between gap-4">
            <span>NAND (CMOS)</span>
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        </div>
        <div class="space-y-0.5 text-neutral-400">
            <div id="row-00" class="flex justify-between gap-4 px-1 rounded transition-colors"><span>0 ⊼ 0</span>
                <span>1</span>
            </div>
            <div id="row-01" class="flex justify-between gap-4 px-1 rounded transition-colors"><span>0 ⊼ 1</span>
                <span>1</span>
            </div>
            <div id="row-10" class="flex justify-between gap-4 px-1 rounded transition-colors"><span>1 ⊼ 0</span>
                <span>1</span>
            </div>
            <div id="row-11" class="flex justify-between gap-4 px-1 rounded transition-colors"><span>1 ⊼ 1</span>
                <span>0</span>
            </div>
        </div>
    </div>

    <!-- The Canvas Viewport -->
    <canvas id="viewport"></canvas>

    <script>
        const canvas = document.getElementById('viewport');
        const ctx = canvas.getContext('2d');

        // State variables for Transform Matrix (Panning and Zooming)
        let zoom = 1.0;
        let pan = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let mousePos = { x: 0, y: 0 };
        let isPanning = false;
        let startPan = { x: 0, y: 0 };

        // Key and Modifier States
        let isSpacePressed = false;
        let isUiVisible = true;

        // LOD Freeze/Override State variables
        let manualLodOverride = 'Dynamic'; // 'Dynamic', 'Micro', 'Meso', 'Macro'

        // Dragging states
        let draggedVisual = null;
        let dragOffset = { x: 0, y: 0 };
        let draggedGroup = null;
        let groupDragOffsets = new Map();
        let currentGroupBounds = new Map(); // Updated during draw loop

        // Active layout tag
        let activePreset = 1;

        // Dynamic Clocking
        let autoClockEnabled = false;
        let masterClockInterval = null;

        // ==========================================
        // ARCHITECTURE DECOUPLING: Brain vs Canvas
        // ==========================================
        const Core = {
            logic: new Map(),   // THE BRAIN: Pure mathematical components (transistors, sources)
            visuals: new Map(), // THE CANVAS: Physical positions and bounds
            wires: [],          // THE CONNECTIONS: Routing data
            macros: new Map(),  // Phase 2: Abstraction Engine LUTs

            clear() {
                this.logic.clear();
                this.visuals.clear();
                this.wires = [];
                this.macros.clear();
            },

            addMacro(groupId, label, inputs, outputDrivers, lutFn) {
                this.macros.set(groupId, { label, inputs, outputDrivers, lutFn });
            },

            addVcc(id, group, x, y, macroGroup = null) {
                this.logic.set(id, { type: 'vcc', state: 1 });
                this.visuals.set(id, { logicId: id, group, macroGroup: macroGroup || group, macroLabel: 'VCC', x, y, width: 40, height: 30, outputPort: { x: 40, y: 15 } });
            },

            addGnd(id, group, x, y, macroGroup = null) {
                this.logic.set(id, { type: 'gnd', state: 0 });
                this.visuals.set(id, { logicId: id, group, macroGroup: macroGroup || group, macroLabel: 'GND', x, y, width: 40, height: 30, outputPort: { x: 40, y: 15 } });
            },

            addSwitch(id, group, label, x, y, startState = 0, macroGroup = null) {
                this.logic.set(id, { type: 'switch', state: startState });
                this.visuals.set(id, { logicId: id, group, macroGroup: macroGroup || group, macroLabel: label, x, y, width: 80, height: 50, outputPort: { x: 80, y: 25 } });
            },

            // Transistors: Port 0 = Gate. Port 1 = Source. Output = Drain.
            addPMOS(id, group, label, x, y, macroGroup = null) {
                this.logic.set(id, { type: 'pmos', state: -1 }); // -1 means Z (Floating)
                this.visuals.set(id, { logicId: id, group, macroGroup: macroGroup || group, macroLabel: label, x, y, width: 80, height: 60, inputs: [{ port: { x: 0, y: 15 } }, { port: { x: 0, y: 45 } }], outputPort: { x: 80, y: 30 } });
            },

            addNMOS(id, group, label, x, y, macroGroup = null) {
                this.logic.set(id, { type: 'nmos', state: -1 });
                this.visuals.set(id, { logicId: id, group, macroGroup: macroGroup || group, macroLabel: label, x, y, width: 80, height: 60, inputs: [{ port: { x: 0, y: 15 } }, { port: { x: 0, y: 45 } }], outputPort: { x: 80, y: 30 } });
            },

            addDisplay(id, group, label, x, y, macroGroup = null) {
                this.logic.set(id, { type: 'display', state: -1 });
                this.visuals.set(id, { logicId: id, group, macroGroup: macroGroup || group, macroLabel: label, x, y, width: 60, height: 60, inputPort: { x: 0, y: 30 } });
            },

            addWire(from, to, toPort, fromPort = 'outputPort') {
                this.wires.push({ from, to, toPort, fromPort });
            }
        };

        function getActualScale() {
            return Math.pow(zoom, 4.566);
        }

        // ==========================================
        // LAYOUTS (CMOS CIRCUITS)
        // ==========================================
        function loadPreset1() {
            activePreset = 1;
            zoom = 1.0;
            pan = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            Core.clear();

            // Proper CMOS NAND Construction (4 Transistors)
            Core.addSwitch('sw_a', 'CMOS NAND Demo', 'SW A', -320, -60, 0);
            Core.addSwitch('sw_b', 'CMOS NAND Demo', 'SW B', -320, 60, 0);

            Core.addVcc('vcc1', 'CMOS NAND Demo', -200, -115);
            Core.addGnd('gnd1', 'CMOS NAND Demo', -280, 115);

            // Parallel pMOS Pull-up Network
            Core.addPMOS('p_a', 'CMOS NAND Demo', 'pMOS A', -60, -90);
            Core.addPMOS('p_b', 'CMOS NAND Demo', 'pMOS B', -60, -10);

            // Series nMOS Pull-down Network
            Core.addNMOS('n_a', 'CMOS NAND Demo', 'nMOS A', -60, 70);
            Core.addNMOS('n_b', 'CMOS NAND Demo', 'nMOS B', -185, 85);

            Core.addDisplay('out1', 'CMOS NAND Demo', 'OUTPUT', 115, -10);

            // Power routing to Sources
            Core.addWire('vcc1', 'p_a', 1);
            Core.addWire('vcc1', 'p_b', 1);
            Core.addWire('gnd1', 'n_b', 1);
            Core.addWire('n_b', 'n_a', 1); // Series connection (n_b drain -> n_a source)

            // Switch routing to Gates
            Core.addWire('sw_a', 'p_a', 0);
            Core.addWire('sw_a', 'n_a', 0);
            Core.addWire('sw_b', 'p_b', 0);
            Core.addWire('sw_b', 'n_b', 0);

            // Drain outputs merged to Display
            Core.addWire('p_a', 'out1', 'inputPort');
            Core.addWire('p_b', 'out1', 'inputPort');
            Core.addWire('n_a', 'out1', 'inputPort');

            // Phase 2: Package into Macro LUT
            Core.addMacro('CMOS NAND Demo', 'NAND', ['sw_a', 'sw_b'], ['p_a', 'p_b', 'n_a'], (a, b) => (a === 1 && b === 1) ? 0 : 1);

            evaluateCircuit();
        }

        function loadPreset2() {
            activePreset = 2;
            zoom = 0.80; // Zoom locked to 80% to trigger Meso mode immediately
            pan = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            Core.clear();

            // TRACK 1: NOT Gate (2 Transistors)
            Core.addSwitch('not_sw', 'NOT Block', 'SWITCH', -320, -900, 0);
            Core.addVcc('not_vcc', 'NOT Block', -240, -935);
            Core.addGnd('not_gnd', 'NOT Block', -240, -825);
            Core.addPMOS('not_p', 'NOT Block', 'pMOS', -130, -935);
            Core.addNMOS('not_n', 'NOT Block', 'nMOS', -130, -855);
            Core.addDisplay('not_out', 'NOT Block', 'NOT OUT', 45, -900);

            Core.addWire('not_vcc', 'not_p', 1);
            Core.addWire('not_gnd', 'not_n', 1);
            Core.addWire('not_sw', 'not_p', 0);
            Core.addWire('not_sw', 'not_n', 0);
            Core.addWire('not_p', 'not_out', 'inputPort');
            Core.addWire('not_n', 'not_out', 'inputPort');


            // TRACK 2: NAND Gate (4 Transistors)
            Core.addSwitch('nand_sw1', 'NAND Block', 'SW A', -320, -480, 1);
            Core.addSwitch('nand_sw2', 'NAND Block', 'SW B', -320, -400, 0);
            Core.addVcc('nand_vcc', 'NAND Block', -180, -525);
            Core.addGnd('nand_gnd', 'NAND Block', -280, -335);
            Core.addPMOS('nand_p1', 'NAND Block', 'pMOS 1', -60, -520);
            Core.addPMOS('nand_p2', 'NAND Block', 'pMOS 2', -60, -450);
            Core.addNMOS('nand_n1', 'NAND Block', 'nMOS 1', -60, -380);
            Core.addNMOS('nand_n2', 'NAND Block', 'nMOS 2', -175, -365);
            Core.addDisplay('nand_out', 'NAND Block', 'NAND OUT', 115, -450);

            Core.addWire('nand_vcc', 'nand_p1', 1);
            Core.addWire('nand_vcc', 'nand_p2', 1);
            Core.addWire('nand_gnd', 'nand_n2', 1);
            Core.addWire('nand_n2', 'nand_n1', 1); // Series
            Core.addWire('nand_sw1', 'nand_p1', 0);
            Core.addWire('nand_sw1', 'nand_n1', 0);
            Core.addWire('nand_sw2', 'nand_p2', 0);
            Core.addWire('nand_sw2', 'nand_n2', 0);
            Core.addWire('nand_p1', 'nand_out', 'inputPort');
            Core.addWire('nand_p2', 'nand_out', 'inputPort');
            Core.addWire('nand_n1', 'nand_out', 'inputPort');


            // TRACK 3: NOR Gate (4 Transistors)
            Core.addSwitch('nor_sw1', 'NOR Block', 'SW A', -320, -50, 0);
            Core.addSwitch('nor_sw2', 'NOR Block', 'SW B', -320, 30, 0);
            Core.addVcc('nor_vcc', 'NOR Block', -250, -120);
            Core.addGnd('nor_gnd', 'NOR Block', -270, 140);
            Core.addPMOS('nor_p1', 'NOR Block', 'pMOS 1', -175, -90);
            Core.addPMOS('nor_p2', 'NOR Block', 'pMOS 2', -60, -30);
            Core.addNMOS('nor_n1', 'NOR Block', 'nMOS 1', -60, 40);
            Core.addNMOS('nor_n2', 'NOR Block', 'nMOS 2', -60, 110);
            Core.addDisplay('nor_out', 'NOR Block', 'NOR OUT', 120, 0);

            Core.addWire('nor_vcc', 'nor_p1', 1);
            Core.addWire('nor_p1', 'nor_p2', 1); // Series pMOS
            Core.addWire('nor_gnd', 'nor_n1', 1); // Parallel nMOS
            Core.addWire('nor_gnd', 'nor_n2', 1);
            Core.addWire('nor_sw1', 'nor_p1', 0);
            Core.addWire('nor_sw1', 'nor_n1', 0);
            Core.addWire('nor_sw2', 'nor_p2', 0);
            Core.addWire('nor_sw2', 'nor_n2', 0);
            Core.addWire('nor_p2', 'nor_out', 'inputPort');
            Core.addWire('nor_n1', 'nor_out', 'inputPort');
            Core.addWire('nor_n2', 'nor_out', 'inputPort');


            // TRACK 4: AND Gate (NAND + NOT = 6 Transistors)
            Core.addSwitch('and_sw1', 'AND Block', 'SW A', -350, 410, 0);
            Core.addSwitch('and_sw2', 'AND Block', 'SW B', -350, 490, 0);
            // NAND Stage
            Core.addVcc('and_vcc1', 'AND Block', -240, 355);
            Core.addGnd('and_gnd1', 'AND Block', -310, 545);
            Core.addPMOS('and_p1', 'AND Block', 'pMOS', -100, 350);
            Core.addPMOS('and_p2', 'AND Block', 'pMOS', -100, 420);
            Core.addNMOS('and_n1', 'AND Block', 'nMOS', -100, 490);
            Core.addNMOS('and_n2', 'AND Block', 'nMOS', -220, 505);
            // NOT Stage
            Core.addVcc('and_vcc2', 'AND Block', 45, 340);
            Core.addGnd('and_gnd2', 'AND Block', 25, 540);
            Core.addPMOS('and_p3', 'AND Block', 'pMOS', 125, 365);
            Core.addNMOS('and_n3', 'AND Block', 'nMOS', 120, 505);
            Core.addDisplay('and_out', 'AND Block', 'AND OUT', 280, 450);

            // NAND Stage Wiring
            Core.addWire('and_vcc1', 'and_p1', 1);
            Core.addWire('and_vcc1', 'and_p2', 1);
            Core.addWire('and_gnd1', 'and_n2', 1);
            Core.addWire('and_n2', 'and_n1', 1);
            Core.addWire('and_sw1', 'and_p1', 0);
            Core.addWire('and_sw1', 'and_n1', 0);
            Core.addWire('and_sw2', 'and_p2', 0);
            Core.addWire('and_sw2', 'and_n2', 0);
            // Route NAND Drains to NOT Gates
            const nandDrains = ['and_p1', 'and_p2', 'and_n1'];
            nandDrains.forEach(src => {
                Core.addWire(src, 'and_p3', 0);
                Core.addWire(src, 'and_n3', 0);
            });
            // NOT Stage Wiring
            Core.addWire('and_vcc2', 'and_p3', 1);
            Core.addWire('and_gnd2', 'and_n3', 1);
            Core.addWire('and_p3', 'and_out', 'inputPort');
            Core.addWire('and_n3', 'and_out', 'inputPort');


            // TRACK 5: OR Gate (NOR + NOT = 6 Transistors)
            Core.addSwitch('or_sw1', 'OR Block', 'SW A', -350, 860, 0);
            Core.addSwitch('or_sw2', 'OR Block', 'SW B', -350, 940, 0);
            // NOR Stage
            Core.addVcc('or_vcc1', 'OR Block', -315, 825);
            Core.addGnd('or_gnd1', 'OR Block', -225, 1030);
            Core.addPMOS('or_p1', 'OR Block', 'pMOS', -210, 795);
            Core.addPMOS('or_p2', 'OR Block', 'pMOS', -100, 860);
            Core.addNMOS('or_n1', 'OR Block', 'nMOS', -100, 930);
            Core.addNMOS('or_n2', 'OR Block', 'nMOS', -100, 1000);
            // NOT Stage
            Core.addVcc('or_vcc2', 'OR Block', 40, 805);
            Core.addGnd('or_gnd2', 'OR Block', 20, 1025);
            Core.addPMOS('or_p3', 'OR Block', 'pMOS', 120, 840);
            Core.addNMOS('or_n3', 'OR Block', 'nMOS', 120, 960);
            Core.addDisplay('or_out', 'OR Block', 'OR OUT', 280, 900);

            // NOR Stage Wiring
            Core.addWire('or_vcc1', 'or_p1', 1);
            Core.addWire('or_p1', 'or_p2', 1);
            Core.addWire('or_gnd1', 'or_n1', 1);
            Core.addWire('or_gnd1', 'or_n2', 1);
            Core.addWire('or_sw1', 'or_p1', 0);
            Core.addWire('or_sw1', 'or_n1', 0);
            Core.addWire('or_sw2', 'or_p2', 0);
            Core.addWire('or_sw2', 'or_n2', 0);
            // Route NOR Drains to NOT Gates
            const norDrains = ['or_p2', 'or_n1', 'or_n2'];
            norDrains.forEach(src => {
                Core.addWire(src, 'or_p3', 0);
                Core.addWire(src, 'or_n3', 0);
            });
            // NOT Stage Wiring
            Core.addWire('or_vcc2', 'or_p3', 1);
            Core.addWire('or_gnd2', 'or_n3', 1);
            Core.addWire('or_p3', 'or_out', 'inputPort');
            Core.addWire('or_n3', 'or_out', 'inputPort');

            // Phase 2: Package into Macro LUTs
            Core.addMacro('NOT Block', 'NOT', ['not_sw'], ['not_p', 'not_n'], (a) => a === 1 ? 0 : 1);
            Core.addMacro('NAND Block', 'NAND', ['nand_sw1', 'nand_sw2'], ['nand_p1', 'nand_p2', 'nand_n1'], (a, b) => (a === 1 && b === 1) ? 0 : 1);
            Core.addMacro('NOR Block', 'NOR', ['nor_sw1', 'nor_sw2'], ['nor_p2', 'nor_n1', 'nor_n2'], (a, b) => (a === 0 && b === 0) ? 1 : 0);
            Core.addMacro('AND Block', 'AND', ['and_sw1', 'and_sw2'], ['and_p3', 'and_n3'], (a, b) => (a === 1 && b === 1) ? 1 : 0);
            Core.addMacro('OR Block', 'OR', ['or_sw1', 'or_sw2'], ['or_p3', 'or_n3'], (a, b) => (a === 1 || b === 1) ? 1 : 0);

            evaluateCircuit();
        }

        function loadPreset3() {
            activePreset = 3;
            zoom = 0.80; // Zoom locked to 80% to trigger Meso mode immediately
            pan = { x: window.innerWidth / 2 + 100, y: window.innerHeight / 2 };
            Core.clear();

            // TRACK 1: Transmission Gate (2 Transistors)
            Core.addSwitch('tg_sig', 'TG Demo', 'SIGNAL', -350, -800, 0);
            Core.addSwitch('tg_en', 'TG Demo', 'ENABLE', -350, -700, 0);
            Core.addSwitch('tg_en_b', 'TG Demo', 'EN_BAR', -350, -620, 1);

            Core.addPMOS('tg_p', 'TG Demo', 'pMOS', -180, -780);
            Core.addNMOS('tg_n', 'TG Demo', 'nMOS', -180, -680);

        function loadPreset4() {

            // Expand the DLatch layout spacing for Micro LOD inside the Meso block
            function buildDLatchLoc(prefix, group, x, y, macroGroup = null) {
